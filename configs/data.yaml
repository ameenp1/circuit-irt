# Where generated artifacts (item bank, metadata, response matrices, frozen
# snapshots) live. For now: the local data/ folder. Flip `backend` to "hf" once
# you create the HuggingFace dataset repo — see circuit_irt/datastore.py.

backend: local              # local | hf

hf:                         # used only when backend: hf
  repo_id: null             # e.g. "your-username/circuit-irt-data"
  revision: null            # commit SHA or tag for reproducible pins; null = main

artifacts:                  # files under data/ (also the set synced to HF later)
  - candidate_bank.json
  - item_metadata.parquet
  - item_metadata.csv
